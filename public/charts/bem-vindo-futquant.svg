<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410" role="img" aria-labelledby="title desc">
<title id="title">Fluxo editorial do FutQuant</title>
<desc id="desc">Quatro etapas: coleta, validação, comparação e publicação verificável.</desc>
<rect width="900" height="410" rx="24" fill="#0f172a"/>
<text x="42" y="58" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Como nasce uma análise FutQuant</text>
<text x="42" y="88" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">Do snapshot à página auditável, sem inventar cotações</text>
<g font-family="system-ui,sans-serif">
  <rect x="42" y="132" width="180" height="150" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="65" y="174" fill="#93c5fd" font-size="18" font-weight="700">1. Coleta</text>
  <text x="65" y="207" fill="#e2e8f0" font-size="15">Preço, plataforma</text>
  <text x="65" y="231" fill="#e2e8f0" font-size="15">e janela temporal</text>
  <rect x="254" y="132" width="180" height="150" rx="18" fill="#052e16" stroke="#4ade80" stroke-width="2"/>
  <text x="277" y="174" fill="#86efac" font-size="18" font-weight="700">2. Validação</text>
  <text x="277" y="207" fill="#e2e8f0" font-size="15">Consistência, prazo</text>
  <text x="277" y="231" fill="#e2e8f0" font-size="15">e dados mínimos</text>
  <rect x="466" y="132" width="180" height="150" rx="18" fill="#422006" stroke="#fbbf24" stroke-width="2"/>
  <text x="489" y="174" fill="#fde68a" font-size="18" font-weight="700">3. Comparação</text>
  <text x="489" y="207" fill="#e2e8f0" font-size="15">Extremos, mediana</text>
  <text x="489" y="231" fill="#e2e8f0" font-size="15">e dispersão</text>
  <rect x="678" y="132" width="180" height="150" rx="18" fill="#3b0764" stroke="#c084fc" stroke-width="2"/>
  <text x="701" y="174" fill="#d8b4fe" font-size="18" font-weight="700">4. Publicação</text>
  <text x="701" y="207" fill="#e2e8f0" font-size="15">Tabela, gráfico</text>
  <text x="701" y="231" fill="#e2e8f0" font-size="15">e contexto</text>
  <text x="239" y="214" fill="#94a3b8" font-size="25">→</text>
  <text x="451" y="214" fill="#94a3b8" font-size="25">→</text>
  <text x="663" y="214" fill="#94a3b8" font-size="25">→</text>
</g>
<rect x="42" y="316" width="816" height="54" rx="14" fill="#1e293b"/>
<text x="450" y="350" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="17" font-weight="600">A tabela é a evidência; o texto e o gráfico precisam concordar com ela.</text>
</svg>
